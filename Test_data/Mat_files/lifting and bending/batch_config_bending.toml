"Noraxon Ultium-右 TENSOR FL." = "tzj+kjmzj.mat"
"Noraxon Ultium-右 RECTUS FEM." = "gzj.mat"
"Noraxon Ultium-右 TIB.ANT." = "jqj.mat"

[emg_processing]
dc_offset_enable = true
bandpass_enable = true
bandpass_cutoff_l = 50
bandpass_cutoff_h = 450
