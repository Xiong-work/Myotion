"Noraxon Ultium-右 EXT.OBLIQUE" = "EXT.OBLIQUE"
"Noraxon Ultium-右 GLUT. MED." = "GLUT. MED."
"Noraxon Ultium-右 LAT. GASTRO" = "LAT. GASTRO"
"Noraxon Ultium-右 LUMBAR ES" = "LUMBAR ES"
"Noraxon Ultium-右 MULTIFIDII" = "MULTIFIDII"
"Noraxon Ultium-右 RECT.ABDOM.LO." = "RECT.ABDOM.LO."
"Noraxon Ultium-右 RECTUS FEM." = "RECTUS FEM."
"Noraxon Ultium-右 TENSOR FL." = "TENSOR FL."
"Noraxon Ultium-右 TIB.ANT." = "TIB.ANT."

[channel_mapping.mvc_file]
"Noraxon Ultium-右 LUMBAR ES" = "beiji.mat"
"Noraxon Ultium-右 MULTIFIDII" = "beiji.mat"
"Noraxon Ultium-右 GLUT. MED." = "tzj+kjmzj.mat"
"Noraxon Ultium-右 BICEPS FEM." = "guer.mat"
"Noraxon Ultium-右 LAT. GASTRO" = "fcj.mat"
"Noraxon Ultium-右 RECT.ABDOM.LO." = "fuji.mat"
